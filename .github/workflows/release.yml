name: release

on:
  push:
    tags: ["v*.*.*", "v*.*.*a*", "v*.*.*b*", "v*.*.*rc*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build wheel + sdist
        run: |
          uv sync
          uv run python -m build
          uv run twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    # TestPyPI publish:
    #   * any pre-release tag (vX.Y.ZaN / bN / rcN), or
    #   * manual dispatch with target=testpypi.
    # Stable tags skip TestPyPI and go straight to PyPI.
    runs-on: ubuntu-latest
    needs: build
    if: |
      (startsWith(github.ref, 'refs/tags/v') &&
        (contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc')))
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/spiderwire
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    # Real PyPI publish:
    #   * stable tag (vX.Y.Z, no a/b/rc), or
    #   * manual dispatch with target=pypi.
    runs-on: ubuntu-latest
    needs: build
    if: |
      (startsWith(github.ref, 'refs/tags/v') &&
        !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc'))
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/spiderwire
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
